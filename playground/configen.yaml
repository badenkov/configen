themes_dir: "themes"

templates:
  ".config/kitty/kitty.conf": "configs/kitty/kitty.conf.erb"
  ".config/nvim": "configs/nvim"

variables:
  font_size: 13
  theme_name: "default"
  leader: "space"

hooks:
  before:
    - description: "demo-before"
      run: "echo '[hook before] about to apply configs'"
      changed:
        - ".config/**"
  after:
    - description: "demo-after"
      run: "echo '[hook after] apply finished'"
      changed:
        - ".config/**"
    - description: "demo-after nvim"
      run: "echo '[hook after] apply finished'"
      changed:
        - ".config/nvim/**"
    - description: "demo-after kitty"
      run: "echo '[hook after] apply finished'"
      changed:
        - ".config/kitty/**"
    - description: "demo-fail"
      run: "echo '[hook after] demo failure' >&2; exit 42"
      if: "test \"${CONFIGEN_DEMO_FAIL:-0}\" = \"1\""
